services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime
      POSTGRES_DB: uptime
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime -d uptime"]
      interval: 3s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sqs
      DEBUG: "0"
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Creates the SQS queue once LocalStack is ready (standard LocalStack queue URL shape).
  sqs-init:
    image: amazon/aws-cli:2.17.0
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name uptime-ping-jobs || true
        aws --endpoint-url=http://localstack:4566 sqs get-queue-url --queue-name uptime-ping-jobs

  api:
    build: .
    command: ["/app/api"]
    environment:
      DATABASE_URL: postgres://uptime:uptime@postgres:5432/uptime?sslmode=disable
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["/app/worker"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://uptime:uptime@postgres:5432/uptime?sslmode=disable
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/uptime-ping-jobs
      SQS_VISIBILITY_TIMEOUT: "120"
      ALERT_WEBHOOK_URL: http://host.docker.internal:8081/webhook
    depends_on:
      postgres:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy

  scheduler:
    build: .
    command: ["/app/scheduler"]
    environment:
      DATABASE_URL: postgres://uptime:uptime@postgres:5432/uptime?sslmode=disable
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/uptime-ping-jobs
      CONFIG_PATH: /config/services.yaml
      SCHEDULER_TICK: 5s
    volumes:
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy

volumes:
  pgdata:
